# Alembic configuration for hfcx-ai-claims
# SRS Section 5 data model migrations — run via:
#   alembic upgrade head
#
# The URL is populated from DATABASE_URL at runtime (see migrations/env.py).
# alembic.ini is the SQLAlchemy-core non-async shim; async engine creation
# happens inside env.py so both code paths share src.config.

[alembic]
script_location = migrations/alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
