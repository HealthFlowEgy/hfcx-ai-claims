# ─────────────────────────────────────────────────────────────────────────────
# HFCX AI Claims Layer — GitHub Actions CI/CD (SRS Section 10.2)
#
# Pipeline stages:
#   1. Lint (ruff)
#   2. Type check (mypy)
#   3. Unit tests (pytest + coverage)
#   4. Build Docker image
#   5. Push to registry
#   6. Deploy via ArgoCD (production)
# ─────────────────────────────────────────────────────────────────────────────
name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: healthflow/hfcx-ai-claims

jobs:

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check src/ tests/ --output-format=github

  # ── Type Check ──────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install mypy pydantic pydantic-settings structlog
      - run: mypy src/ --ignore-missing-imports --no-strict-optional

  # ── Unit Tests ──────────────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Create test .env
        run: |
          cat > .env <<EOF
          APP_ENV=development
          SECRET_KEY=test-secret-key-32-characters-long
          DATABASE_URL=postgresql+asyncpg://test:test@localhost:5432/test
          REDIS_URL=redis://localhost:6379/0
          KEYCLOAK_CLIENT_SECRET=test
          EOF

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing \
             --ignore=tests/test_kafka  # Kafka tests need testcontainers (integration)
        env:
          PYTHONPATH: .

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── Docker Build ─────────────────────────────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy (ArgoCD) ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Update image tag in k8s manifest
        run: |
          IMAGE_TAG="${{ github.sha }}"
          sed -i "s|healthflow/hfcx-ai-claims:.*|healthflow/hfcx-ai-claims:${IMAGE_TAG}|g" \
            k8s/manifests.yaml

      - name: Commit updated manifest
        run: |
          git config --local user.email "ci@healthflow.io"
          git config --local user.name "HealthFlow CI"
          git add k8s/manifests.yaml
          git commit -m "ci: update image to ${{ github.sha }}" || echo "No changes"
          git push

      # ArgoCD watches the repo and auto-syncs the hcx-ai namespace
      - name: Trigger ArgoCD sync
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.ARGOCD_TOKEN }}" \
            "${{ secrets.ARGOCD_SERVER }}/api/v1/applications/hfcx-ai-claims/sync"
