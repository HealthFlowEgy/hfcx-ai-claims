# ─────────────────────────────────────────────────────────────────────────────
# HFCX AI Claims — Deploy to DigitalOcean
#
# Triggers:
#   - Push to main (auto-deploy to staging)
#   - Manual dispatch (deploy to staging or production)
#
# Prerequisites (GitHub Secrets):
#   DIGITALOCEAN_ACCESS_TOKEN  — DO API token (read+write)
#   DIGITALOCEAN_CLUSTER_NAME  — DOKS cluster name (e.g., hfcx-ai-claims-staging)
#   DATABASE_URL               — Managed PG connection string
#   REDIS_URL                  — Managed Redis connection string
#   SECRET_KEY                 — App secret key (32+ chars)
#   KEYCLOAK_CLIENT_SECRET     — Keycloak service account secret
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: 'Skip test suite (emergency hotfix)'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  REGISTRY: registry.digitalocean.com/hfcx-registry
  BACKEND_IMAGE: hfcx-ai-claims-backend
  FRONTEND_IMAGE: hfcx-ai-claims-frontend
  K8S_NAMESPACE: hcx-ai

jobs:
  # ── Test Gate ────────────────────────────────────────────────────────────
  test:
    if: ${{ !inputs.skip_tests }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install backend dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      # NOTE: mypy is intentionally NOT run here. .github/workflows/ci.yml
      # runs mypy in its own dedicated job with a minimal dep install
      # (mypy + pydantic + pydantic-settings + structlog), which is the
      # authoritative type-check gate. Running mypy again here against a
      # full `.[dev]` environment exposes it to a different set of type
      # stubs and surfaces false positives (observed on commit 4a9fe8a).
      # ci.yml runs on every push to main anyway, so we don't lose coverage.

      - name: Unit tests
        # Mirror .github/workflows/ci.yml — rely on pyproject.toml addopts
        # for --cov-fail-under so both gates stay in lockstep and the
        # deploy pipeline does not drift from CI.
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing
        env:
          APP_ENV: development
          PYTHONPATH: .
          SECRET_KEY: test-secret-key-32-characters-long
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0
          KEYCLOAK_CLIENT_SECRET: test

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend lint + typecheck
        working-directory: frontend
        run: |
          npm run lint
          npx tsc --noEmit

      - name: Frontend tests
        working-directory: frontend
        run: npx vitest run

  # ── Build & Push Backend Image ──────────────────────────────────────────
  build-backend:
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DOCR
        run: doctl registry login --expiry-seconds 3600

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build & Push Frontend Image ─────────────────────────────────────────
  build-frontend:
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DOCR
        run: doctl registry login --expiry-seconds 1200

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ vars.API_BASE_URL || 'https://api.healthflow.eg' }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:buildcache,mode=max

  # ── Database Migration ──────────────────────────────────────────────────
  migrate:
    needs: [build-backend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install migration dependencies
        # migrations/alembic/env.py imports src.config + src.models.orm
        # and uses async_engine_from_config which requires asyncpg.
        run: pip install -e . asyncpg

      - name: Run migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_MIGRATE }}
          # Minimum viable Settings — these are required fields on
          # Settings but unused by env.py; provide safe placeholders so
          # pydantic-settings can instantiate without crashing.
          SECRET_KEY: migration-only-placeholder-32-characters-long
          KEYCLOAK_CLIENT_SECRET: migration-only-placeholder
          REDIS_URL: redis://placeholder:6379/0

  # ── Deploy to DOKS ─────────────────────────────────────────────────────
  deploy:
    needs: [build-backend, build-frontend, migrate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: |
          doctl kubernetes cluster kubeconfig save \
            ${{ secrets.DIGITALOCEAN_CLUSTER_NAME || 'hfcx-ai-claims-staging' }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.3

      - name: Create namespaces
        run: |
          for ns in ${{ env.K8S_NAMESPACE }} ingress-nginx cert-manager; do
            kubectl create namespace "$ns" \
              --dry-run=client -o yaml | kubectl apply -f -
          done

      - name: Install / upgrade ingress-nginx + cert-manager
        # Idempotent: Helm upgrade --install is a no-op on repeat runs.
        # ingress-nginx brings up the public LoadBalancer with the DO
        # annotations we need; cert-manager issues Let's Encrypt certs.
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo add jetstack https://charts.jetstack.io
          helm repo update

          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx \
            --version 4.11.1 \
            --set controller.publishService.enabled=true \
            --set controller.service.type=LoadBalancer \
            --set-string controller.service.annotations."service\.beta\.kubernetes\.io/do-loadbalancer-name"="hfcx-ai-lb" \
            --set-string controller.service.annotations."service\.beta\.kubernetes\.io/do-loadbalancer-enable-proxy-protocol"="true" \
            --set-string controller.service.annotations."service\.beta\.kubernetes\.io/do-loadbalancer-sticky-sessions-type"="cookies" \
            --set-string controller.service.annotations."service\.beta\.kubernetes\.io/do-loadbalancer-sticky-sessions-cookie-name"="HFCX_LB" \
            --set-string controller.service.annotations."service\.beta\.kubernetes\.io/do-loadbalancer-sticky-sessions-cookie-ttl"="300" \
            --set-string controller.config.use-proxy-protocol="true" \
            --set-string controller.config.hide-headers="X-Powered-By" \
            --set-string controller.config.hsts="true" \
            --set-string controller.config.hsts-max-age="31536000" \
            --set-string controller.config.hsts-include-subdomains="true" \
            --set-string controller.config.ssl-redirect="true" \
            --set controller.addHeaders.X-Frame-Options=DENY \
            --set controller.addHeaders.X-Content-Type-Options=nosniff \
            --set controller.addHeaders.X-XSS-Protection="1; mode=block" \
            --set controller.addHeaders.Referrer-Policy=strict-origin-when-cross-origin \
            --wait --timeout 5m

          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --version v1.15.3 \
            --set installCRDs=true \
            --wait --timeout 5m

      - name: Copy DOCR pull secret to hcx-ai namespace
        # `doctl kubernetes cluster registry add` (run in provision.sh) only
        # creates the DOCR secret in the default namespace. Copy it into
        # every namespace that pulls images from registry.digitalocean.com.
        run: |
          SECRET_NAME=$(kubectl get secret -n default \
            -o jsonpath='{.items[?(@.type=="kubernetes.io/dockerconfigjson")].metadata.name}' \
            | tr ' ' '\n' | grep -E '^registry-hfcx|^hfcx-registry' | head -1)
          if [[ -z "${SECRET_NAME}" ]]; then
            SECRET_NAME="hfcx-registry"
            doctl registry kubernetes-manifest | \
              kubectl apply --namespace ${{ env.K8S_NAMESPACE }} --force -f - || true
          else
            # Delete and recreate to avoid resourceVersion conflicts
            kubectl delete secret "${SECRET_NAME}" -n ${{ env.K8S_NAMESPACE }} --ignore-not-found=true
            kubectl get secret "${SECRET_NAME}" -n default -o yaml \
              | sed 's/namespace: default/namespace: ${{ env.K8S_NAMESPACE }}/' \
              | sed '/resourceVersion:/d' \
              | sed '/uid:/d' \
              | sed '/creationTimestamp:/d' \
              | kubectl create -f -
          fi

          # Patch the default ServiceAccount in hcx-ai to use the secret
          kubectl patch serviceaccount default \
            --namespace ${{ env.K8S_NAMESPACE }} \
            -p "{\"imagePullSecrets\": [{\"name\": \"${SECRET_NAME}\"}]}" || true

      - name: Create/update secrets
        run: |
          kubectl create secret generic hfcx-ai-secrets \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=REDIS_URL="${{ secrets.REDIS_URL }}" \
            --from-literal=SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            --from-literal=KEYCLOAK_CLIENT_SECRET="${{ secrets.KEYCLOAK_CLIENT_SECRET }}" \
            --from-literal=LITELLM_API_KEY="${{ secrets.LITELLM_API_KEY || 'sk-internal-hfcx' }}" \
            --from-literal=NDP_API_KEY="${{ secrets.NDP_API_KEY || '' }}" \
            --from-literal=MINIO_ACCESS_KEY="${{ secrets.MINIO_ACCESS_KEY || 'minioadmin' }}" \
            --from-literal=MINIO_SECRET_KEY="${{ secrets.MINIO_SECRET_KEY || 'minioadmin' }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create/update support ConfigMaps from repo files
        # LiteLLM + Prometheus pods in supporting-services.yaml expect
        # ConfigMaps that are not defined anywhere else. Build them from
        # the checked-in config files so a deploy from a clean cluster
        # can stand up every dependency in one pass.
        run: |
          kubectl create configmap litellm-config \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --from-file=litellm_config.yaml=config/litellm_config.yaml \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create configmap prometheus-config \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --from-file=prometheus.yml=config/prometheus.yml \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply supporting services (Redpanda, Chroma, LiteLLM, Ollama, Prom, Grafana, Jaeger)
        run: |
          kubectl apply -f deploy/digitalocean/k8s/supporting-services.yaml

      - name: Set image tags in manifests
        run: |
          export IMAGE_TAG="${{ github.sha }}"
          export BACKEND_IMG="${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:sha-${IMAGE_TAG:0:7}"
          export FRONTEND_IMG="${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:sha-${IMAGE_TAG:0:7}"
          export ENVIRONMENT="${{ github.event.inputs.environment || 'staging' }}"

          # Substitute image tags in DOKS manifests
          envsubst < deploy/digitalocean/k8s/backend.yaml | kubectl apply -f -
          envsubst < deploy/digitalocean/k8s/frontend.yaml | kubectl apply -f -
          kubectl apply -f deploy/digitalocean/k8s/services.yaml
          kubectl apply -f deploy/digitalocean/k8s/ingress.yaml

      - name: Wait for rollout
        run: |
          echo "▸ Waiting for backend rollout..."
          kubectl rollout status deployment/hfcx-ai-api \
            --namespace ${{ env.K8S_NAMESPACE }} --timeout=300s

          echo "▸ Waiting for consumer rollout..."
          kubectl rollout status deployment/hfcx-ai-consumer \
            --namespace ${{ env.K8S_NAMESPACE }} --timeout=300s

          echo "▸ Waiting for frontend rollout..."
          kubectl rollout status deployment/hfcx-frontend \
            --namespace ${{ env.K8S_NAMESPACE }} --timeout=300s

      - name: Verify deployment
        run: |
          echo "── Pod Status ──"
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} -o wide
          echo ""
          echo "── Services ──"
          kubectl get svc -n ${{ env.K8S_NAMESPACE }}
          echo ""
          echo "── Ingress ──"
          kubectl get ingress -n ${{ env.K8S_NAMESPACE }}

      - name: Health check
        run: |
          # The public LoadBalancer is owned by the ingress-nginx controller
          # (Helm-managed in the ingress-nginx namespace). Wait for it to
          # acquire an external IP, then exercise the backend via the
          # in-cluster service to avoid DNS dependencies during CI.
          for i in $(seq 1 30); do
            LB_IP=$(kubectl get svc ingress-nginx-controller \
              -n ingress-nginx \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            if [[ -n "${LB_IP}" ]]; then break; fi
            echo "Waiting for LoadBalancer IP... (${i}/30)"
            sleep 10
          done

          if [[ -n "${LB_IP}" ]]; then
            echo "LoadBalancer IP: ${LB_IP}"
          else
            echo "LoadBalancer IP not yet assigned — check manually"
          fi

          # In-cluster smoke test against the backend service
          kubectl run --rm -i --restart=Never hfcx-health-probe \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --image=curlimages/curl:8.9.1 \
            --command -- curl -sSf --max-time 15 \
              "http://hfcx-ai-api.${{ env.K8S_NAMESPACE }}.svc.cluster.local:8090/internal/ai/health" \
            || echo "Backend health check failed — services may still be starting"

  # ── Post-deploy Notification ────────────────────────────────────────────
  notify:
    needs: [deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | ${{ github.event.inputs.environment || 'staging' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deploy status** | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Backend image** | \`${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:sha-${GITHUB_SHA:0:7}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Frontend image** | \`${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:sha-${GITHUB_SHA:0:7}\` |" >> $GITHUB_STEP_SUMMARY
