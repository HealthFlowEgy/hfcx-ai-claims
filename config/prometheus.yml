global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: hfcx-ai-claims
    static_configs:
      - targets: ["ai-claims:8090"]
    metrics_path: /internal/ai/metrics

  - job_name: redpanda
    static_configs:
      - targets: ["redpanda:9644"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
