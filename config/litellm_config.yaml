# ─────────────────────────────────────────────────────────────────────────────
# LiteLLM Proxy Configuration (SRS Section 2.1, NFR-005)
#
# Run with: litellm --config config/litellm_config.yaml
# Or via Docker: docker run -p 4000:4000 -v $(pwd)/config:/config \
#                ghcr.io/berriai/litellm --config /config/litellm_config.yaml
#
# Blue-green model updates: change the weights on the `coordinator-model`
# alias entries to shift traffic between model versions. Agents always call
# `coordinator-model` (see src/services/llm_service.py:COORDINATOR_MODEL_ALIAS)
# so no agent restart is required.
#
# Model routing strategy:
#   - Production: OpenAI models via API (reliable, no GPU infra needed)
#   - Future: Uncomment Ollama entries below to add local model backends
#     and use weighted routing for gradual migration.
# ─────────────────────────────────────────────────────────────────────────────

general_settings:
  # Fix NEW-3: master_key from env var so rotating the GitHub secret
  # actually rotates the accepted key.
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: null
  disable_spend_logs: true
  request_timeout: 60

litellm_settings:
  request_timeout: 60
  retry_policy:
    ContentPolicyViolationError:
      num_retries: 0
    RateLimitError:
      num_retries: 3
  telemetry: false   # Disable external telemetry (NFR-003 data sovereignty)

router_settings:
  routing_strategy: least-busy
  allowed_fails: 3
  cooldown_time: 10

model_list:
  # ── OpenAI models (production) ────────────────────────────────────────────
  # OPENAI_API_KEY is injected as an env var from hfcx-ai-secrets.LITELLM_API_KEY
  # LiteLLM automatically picks it up for openai/* models.

  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      timeout: 60
      max_tokens: 4096

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      timeout: 30
      max_tokens: 4096

  - model_name: gpt-4-turbo
    litellm_params:
      model: openai/gpt-4-turbo
      timeout: 60
      max_tokens: 4096

  - model_name: gpt-3.5-turbo
    litellm_params:
      model: openai/gpt-3.5-turbo
      timeout: 20
      max_tokens: 4096

  - model_name: text-embedding-3-small
    litellm_params:
      model: openai/text-embedding-3-small
      timeout: 10

  - model_name: text-embedding-3-large
    litellm_params:
      model: openai/text-embedding-3-large
      timeout: 10

  # ── Blue-green alias (NFR-005): agents call `coordinator-model` ───────────
  # All entries with model_name=coordinator-model form a weighted pool.
  # Shift traffic by editing weights — LiteLLM hot-reloads this file.
  - model_name: coordinator-model
    litellm_params:
      model: openai/gpt-4o
      timeout: 60
      max_tokens: 4096
      weight: 100

  # ── Coding agent model ────────────────────────────────────────────────────
  - model_name: coding-model
    litellm_params:
      model: openai/gpt-4o
      timeout: 60
      max_tokens: 4096

  # ── Arabic NLP model ──────────────────────────────────────────────────────
  - model_name: arabic-model
    litellm_params:
      model: openai/gpt-4o
      timeout: 60
      max_tokens: 4096

  # ── Fast model (for eligibility, quick checks) ────────────────────────────
  - model_name: fast-model
    litellm_params:
      model: openai/gpt-4o-mini
      timeout: 30
      max_tokens: 4096

  # ── Local Ollama models (future — uncomment when GPU nodes are available) ─
  # - model_name: ollama/medgemma:27b
  #   litellm_params:
  #     model: ollama/medgemma:27b
  #     api_base: http://ollama.hcx-ai.svc.cluster.local:11434
  #     timeout: 60
  #     max_tokens: 2000
  #
  # - model_name: ollama/llama3:8b-instruct
  #   litellm_params:
  #     model: ollama/llama3:8b-instruct
  #     api_base: http://ollama.hcx-ai.svc.cluster.local:11434
  #     timeout: 30
  #     max_tokens: 1000
  #
  # - model_name: ollama/nomic-embed-text
  #   litellm_params:
  #     model: ollama/nomic-embed-text
  #     api_base: http://ollama.hcx-ai.svc.cluster.local:11434
  #     timeout: 10
