# ─────────────────────────────────────────────────────────────────────────────
# LiteLLM Proxy Configuration (SRS Section 2.1, NFR-005)
#
# Run with: litellm --config config/litellm_config.yaml
# Or via Docker: docker run -p 4000:4000 -v $(pwd)/config:/config \
#                ghcr.io/berriai/litellm --config /config/litellm_config.yaml
#
# Blue-green model updates: change model_name aliases without agent restarts.
# ─────────────────────────────────────────────────────────────────────────────

general_settings:
  master_key: sk-internal-hfcx        # Matches LITELLM_API_KEY in .env
  database_url: null                   # Optional: PostgreSQL for usage tracking
  disable_spend_logs: false
  request_timeout: 30

litellm_settings:
  request_timeout: 30
  retry_policy:
    ContentPolicyViolationError:
      num_retries: 0
    RateLimitError:
      num_retries: 3
  telemetry: false                     # Disable external telemetry (NFR-003 data sovereignty)

router_settings:
  routing_strategy: least-busy         # Load balance across multiple Ollama instances
  allowed_fails: 3
  cooldown_time: 10

model_list:
  # ── Primary reasoning model (MedGemma 27B) — GPU node ──────────────────────
  - model_name: ollama/medgemma:27b
    litellm_params:
      model: ollama/medgemma:27b
      api_base: http://ollama-gpu:11434   # GPU node Ollama instance
      timeout: 60
      max_tokens: 2000
    model_info:
      mode: chat
      supports_function_calling: false

  # ── Coding model (Fine-tuned Llama 8B ICD-10) ──────────────────────────────
  - model_name: ollama/llama3:8b-instruct
    litellm_params:
      model: ollama/llama3:8b-instruct
      api_base: http://ollama-cpu-1:11434
      timeout: 30
      max_tokens: 1000
    model_info:
      mode: chat

  # ── Arabic medical model (BiMediX 8x7B MoE) ───────────────────────────────
  - model_name: ollama/bimediX:8x7b
    litellm_params:
      model: ollama/bimediX:8x7b
      api_base: http://ollama-gpu:11434
      timeout: 45
      max_tokens: 500
    model_info:
      mode: chat

  # ── Fast edge model (Qwen3 7B) — for quick validations ───────────────────
  - model_name: ollama/qwen3:7b
    litellm_params:
      model: ollama/qwen3:7b
      api_base: http://ollama-cpu-2:11434
      timeout: 20
      max_tokens: 500
    model_info:
      mode: chat

  # ── Embedding model (for ChromaDB ingestion) ──────────────────────────────
  - model_name: ollama/nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://ollama-cpu-1:11434
      timeout: 10
    model_info:
      mode: embedding

  # ── Blue-green alias: route 100% traffic to v1, gradually shift to v2 ─────
  # (NFR-005: zero-downtime model updates)
  # To shift traffic: change weights from [100, 0] to [80, 20] etc.
  - model_name: coordinator-model          # Used by agents as abstract alias
    litellm_params:
      model: ollama/medgemma:27b
      api_base: http://ollama-gpu:11434
      weight: 100
  # - model_name: coordinator-model        # v2 — uncomment to start blue-green
  #   litellm_params:
  #     model: ollama/medgemma:27b-v2
  #     api_base: http://ollama-gpu-2:11434
  #     weight: 0

# ── Rate limits per model ──────────────────────────────────────────────────
# Prevents GPU overload during claim processing spikes
model_group_settings:
  ollama/medgemma:27b:
    rpm: 30                              # 30 requests per minute per GPU node
  ollama/llama3:8b-instruct:
    rpm: 60
  ollama/bimediX:8x7b:
    rpm: 20
