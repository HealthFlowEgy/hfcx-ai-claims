# ─────────────────────────────────────────────────────────────────────────────
# LiteLLM Proxy Configuration — Self-Hosted Models Only (SRS Section 2.1-2.2)
#
# All inference is routed to locally hosted Ollama models running on dedicated
# nodes in the DigitalOcean Kubernetes cluster. No external API calls.
#
# Current node constraint: 8GB RAM (~5.3GB available after OS/K8s overhead)
# Model routing (memory-optimized):
#   coordinator-model → MedGemma 4B  (2.5GB — fits 8GB node)
#   coding-model      → Llama 3.1 8B q4_K_M (4.9GB — fits 8GB node)
#   arabic-model      → MedGemma 4B  (2.5GB — Arabic medical NLP)
#   fast-model        → Qwen 2.5 7B  (4.7GB — fits 8GB node)
#   embedding-model   → nomic-embed-text (274MB)
#
# UPGRADE PATH: When 16GB+ nodes are available, switch coordinator-model
# and arabic-model to MedGemma 27B, coding-model to q5_K_M, and
# fast-model to Qwen 3 8B for improved accuracy.
# ─────────────────────────────────────────────────────────────────────────────

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: null
  disable_spend_logs: true
  request_timeout: 300

litellm_settings:
  request_timeout: 300
  retry_policy:
    ContentPolicyViolationError:
      num_retries: 0
    RateLimitError:
      num_retries: 3
  telemetry: false
  drop_params: true

router_settings:
  routing_strategy: least-busy
  allowed_fails: 3
  cooldown_time: 10

model_list:

  # ── MedGemma 4B — Primary Claim Reasoning (SRS §2.2) ─────────────────────
  # Used by: Medical Necessity Agent, Coordinator Agent
  # Running on: ollama-medgemma pod | Memory: 2.5GB
  # NOTE: Upgrade to MedGemma 27B when 16GB nodes are available
  - model_name: coordinator-model
    litellm_params:
      model: ollama/alibayram/medgemma:4b
      api_base: http://ollama-medgemma.hcx-ai.svc.cluster.local:11434
      timeout: 300
      max_tokens: 4096
      stream: false

  # ── MedGemma 4B — Arabic Medical NLP (SRS §2.2) ──────────────────────────
  # Used by: Medical Coding Agent (Arabic text), Medical Necessity Agent
  # Same model, same pod — MedGemma supports Arabic natively
  - model_name: arabic-model
    litellm_params:
      model: ollama/alibayram/medgemma:4b
      api_base: http://ollama-medgemma.hcx-ai.svc.cluster.local:11434
      timeout: 300
      max_tokens: 4096
      stream: false

  # ── Llama 3.1 8B q4_K_M — ICD-10 Code Validation (SRS §2.2) ─────────────
  # Used by: Medical Coding Agent
  # Running on: ollama-llama pod | Memory: 4.9GB
  - model_name: coding-model
    litellm_params:
      model: ollama/llama3.1:8b-instruct-q4_K_M
      api_base: http://ollama-llama.hcx-ai.svc.cluster.local:11434
      timeout: 120
      max_tokens: 4096
      stream: false

  # ── Qwen 2.5 7B — Fast Edge Model (SRS §2.2) ────────────────────────────
  # Used by: Eligibility Agent, quick validation checks
  # Running on: ollama-qwen pod | Memory: 4.7GB
  - model_name: fast-model
    litellm_params:
      model: ollama/qwen2.5:7b
      api_base: http://ollama-qwen.hcx-ai.svc.cluster.local:11434
      timeout: 60
      max_tokens: 4096
      stream: false

  # ── Nomic Embed Text — RAG Embeddings (SRS §2.3) ─────────────────────────
  # Used by: ChromaDB vector store for medical necessity knowledge base
  # Running on: ollama-qwen pod alongside Qwen | Memory: 274MB
  - model_name: embedding-model
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://ollama-qwen.hcx-ai.svc.cluster.local:11434
      timeout: 30

  # ── Direct model names (backward compatibility) ───────────────────────────
  - model_name: ollama/alibayram/medgemma:27b
    litellm_params:
      model: ollama/alibayram/medgemma:27b
      api_base: http://ollama-medgemma.hcx-ai.svc.cluster.local:11434
      timeout: 300
      max_tokens: 4096
      stream: false

  - model_name: ollama/alibayram/medgemma:4b
    litellm_params:
      model: ollama/alibayram/medgemma:4b
      api_base: http://ollama-medgemma.hcx-ai.svc.cluster.local:11434
      timeout: 120
      max_tokens: 4096
      stream: false

  - model_name: ollama/llama3.1:8b-instruct-q5_K_M
    litellm_params:
      model: ollama/llama3.1:8b-instruct-q5_K_M
      api_base: http://ollama-llama.hcx-ai.svc.cluster.local:11434
      timeout: 120
      max_tokens: 4096
      stream: false

  - model_name: ollama/llama3.1:8b-instruct-q4_K_M
    litellm_params:
      model: ollama/llama3.1:8b-instruct-q4_K_M
      api_base: http://ollama-llama.hcx-ai.svc.cluster.local:11434
      timeout: 120
      max_tokens: 4096
      stream: false

  - model_name: ollama/qwen3:8b
    litellm_params:
      model: ollama/qwen3:8b
      api_base: http://ollama-qwen.hcx-ai.svc.cluster.local:11434
      timeout: 60
      max_tokens: 4096
      stream: false

  - model_name: ollama/qwen2.5:7b
    litellm_params:
      model: ollama/qwen2.5:7b
      api_base: http://ollama-qwen.hcx-ai.svc.cluster.local:11434
      timeout: 60
      max_tokens: 4096
      stream: false

  - model_name: ollama/nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://ollama-qwen.hcx-ai.svc.cluster.local:11434
      timeout: 30
