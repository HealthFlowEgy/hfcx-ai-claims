# ─────────────────────────────────────────────────────────────────────────────
# HFCX AI Claims — Services (DigitalOcean DOKS)
# ─────────────────────────────────────────────────────────────────────────────

# ── Backend ClusterIP Service ────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: hfcx-ai-api
  namespace: hcx-ai
  labels:
    app.kubernetes.io/name: hfcx-ai-claims
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: hfcx-ai-claims
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8090
      targetPort: 8090
      protocol: TCP

---
# ── Frontend ClusterIP Service ───────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: hfcx-frontend
  namespace: hcx-ai
  labels:
    app.kubernetes.io/name: hfcx-ai-claims
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: hfcx-ai-claims
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP

---
# ── LoadBalancer ─────────────────────────────────────────────────────────────
# NOTE: the public DigitalOcean LoadBalancer is NOT defined here.
#
# The deploy workflow installs `ingress-nginx` via Helm. That chart creates
# its own Service of type LoadBalancer in the `ingress-nginx` namespace with
# the DigitalOcean annotations we want (proxy-protocol, sticky cookies,
# health check path, etc — see deploy-digitalocean.yml "Install ingress-nginx"
# step for the values). nginx-ingress then host-routes external traffic to
# `hfcx-ai-api` and `hfcx-frontend` via the rules in ingress.yaml.
#
# A previous revision of this file defined an `hfcx-ai-lb` Service with a
# selector on `component: api` AND a frontend port that mapped `80 -> 3000`.
# That was a silent bug: a Service only forwards traffic to pods matching
# its selector, so the frontend port could never reach the frontend pods.
# We removed the Service entirely and rely on nginx-ingress instead.

---
# ── PodDisruptionBudget — API ────────────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: hfcx-ai-api-pdb
  namespace: hcx-ai
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: hfcx-ai-claims
      app.kubernetes.io/component: api

---
# ── PodDisruptionBudget — Consumer ───────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: hfcx-ai-consumer-pdb
  namespace: hcx-ai
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: hfcx-ai-claims
      app.kubernetes.io/component: consumer

---
# ── PodDisruptionBudget — Frontend ───────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: hfcx-frontend-pdb
  namespace: hcx-ai
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hfcx-ai-claims
      app.kubernetes.io/component: frontend
