# ─────────────────────────────────────────────────────────────────────────────
# HFCX AI Claims — Keycloak Identity Provider (SEC-001)
#
# Provides:
#   - Service-to-service JWT authentication for internal AI APIs
#   - User authentication for frontend portals (Provider, Payer, SIU, Regulatory)
#   - Realm: hcx
#   - Clients: hfcx-ai-service (confidential), hfcx-portal (public)
# ─────────────────────────────────────────────────────────────────────────────

# ── Keycloak Database (dedicated PostgreSQL schema via existing managed PG) ──
# Keycloak uses its own database within the managed PostgreSQL cluster.
# The database "keycloak" must be created beforehand (handled by deploy workflow).

---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: hcx-ai
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: identity
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app.kubernetes.io/name: keycloak

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: hcx-ai
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: identity
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/component: identity
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0
          args:
            - start-dev
            - --hostname=auth.claim.healthflow.tech
            - --hostname-strict=false
            - --http-enabled=true
            - --proxy-headers=xforwarded
            - --import-realm
          ports:
            - containerPort: 8080
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              valueFrom:
                secretKeyRef:
                  name: hfcx-ai-secrets
                  key: KEYCLOAK_DB_URL
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: hfcx-ai-secrets
                  key: KEYCLOAK_DB_USERNAME
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hfcx-ai-secrets
                  key: KEYCLOAK_DB_PASSWORD
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hfcx-ai-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_METRICS_ENABLED
              value: "true"
          volumeMounts:
            - name: realm-config
              mountPath: /opt/keycloak/data/import
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm-config
