# ─────────────────────────────────────────────────────────────────────────────
# HFCX AI Claims — Supporting Services (DigitalOcean DOKS)
#
# These run inside the cluster. PostgreSQL and Redis are DO Managed Databases
# (external to the cluster, connected via secrets).
# ─────────────────────────────────────────────────────────────────────────────

# ── Redpanda (Kafka-compatible) ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda
  namespace: hcx-ai
  labels:
    app.kubernetes.io/name: redpanda
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redpanda
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redpanda
    spec:
      securityContext:
        fsGroup: 101
      initContainers:
        - name: fix-perms
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 101:101 /var/lib/redpanda/data"]
          volumeMounts:
            - name: redpanda-data
              mountPath: /var/lib/redpanda/data
          securityContext:
            runAsUser: 0
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:v24.1.1
          args:
            - redpanda
            - start
            - --smp=1
            - --memory=1G
            - --overprovisioned
            - --kafka-addr=0.0.0.0:9092
            - --advertise-kafka-addr=redpanda.hcx-ai.svc.cluster.local:9092
          ports:
            - containerPort: 9092
              name: kafka
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: redpanda-data
              mountPath: /var/lib/redpanda/data
      volumes:
        - name: redpanda-data
          persistentVolumeClaim:
            claimName: redpanda-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: hcx-ai
spec:
  selector:
    app.kubernetes.io/name: redpanda
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redpanda-pvc
  namespace: hcx-ai
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: do-block-storage
  resources:
    requests:
      storage: 20Gi

---
# ── ChromaDB (Vector Store for RAG) ─────────────────────────────────────────
# NOTE: chromadb/chroma:0.5.5 runs as root by default, so no fix-perms init
# container is needed. If a future version drops root privileges, add an init
# container similar to Redpanda/Grafana/Prometheus above with the appropriate
# UID (check the image's Dockerfile).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromadb
  namespace: hcx-ai
  labels:
    app.kubernetes.io/name: chromadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chromadb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chromadb
    spec:
      containers:
        - name: chromadb
          image: chromadb/chroma:0.5.5
          ports:
            - containerPort: 8000
          env:
            - name: ANONYMIZED_TELEMETRY
              value: "false"
            - name: PERSIST_DIRECTORY
              value: /chroma/data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: chroma-data
              mountPath: /chroma/data
      volumes:
        - name: chroma-data
          persistentVolumeClaim:
            claimName: chromadb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: chromadb
  namespace: hcx-ai
spec:
  selector:
    app.kubernetes.io/name: chromadb
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chromadb-pvc
  namespace: hcx-ai
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: do-block-storage
  resources:
    requests:
      storage: 10Gi

---
# ── LiteLLM Gateway ─────────────────────────────────────────────────────────
# NOTE: The LiteLLM ConfigMap is created by the deploy workflow step
# "Create/update support ConfigMaps from repo files" from
# config/litellm_config.yaml. Do NOT define an inline ConfigMap here to
# avoid a double-definition that overwrites the repo-sourced version.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: hcx-ai
  labels:
    app.kubernetes.io/name: litellm
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-v1.55.3
          args: ["--config", "/config/litellm_config.yaml"]
          ports:
            - containerPort: 4000
          env:
            # OPENAI_API_KEY: used by LiteLLM to authenticate with OpenAI
            # for all openai/* models in the config.
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hfcx-ai-secrets
                  key: LITELLM_API_KEY
            # LITELLM_MASTER_KEY: used by config/litellm_config.yaml via
            # os.environ/LITELLM_MASTER_KEY to authenticate proxy clients.
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: hfcx-ai-secrets
                  key: LITELLM_API_KEY
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: hcx-ai
spec:
  selector:
    app.kubernetes.io/name: litellm
  ports:
    - name: http
      port: 4000
      targetPort: 4000

---
# ── Ollama (LLM Runtime) ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: hcx-ai
  labels:
    app.kubernetes.io/name: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:0.3.6
          ports:
            - containerPort: 11434
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
              # Uncomment for GPU nodes:
              # nvidia.com/gpu: "1"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      # Uncomment for GPU nodes:
      # nodeSelector:
      #   workload: gpu-inference
      # tolerations:
      #   - key: nvidia.com/gpu
      #     operator: Exists
      #     effect: NoSchedule
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: hcx-ai
spec:
  selector:
    app.kubernetes.io/name: ollama
  ports:
    - name: http
      port: 11434
      targetPort: 11434
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-pvc
  namespace: hcx-ai
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: do-block-storage
  resources:
    requests:
      storage: 50Gi

---
# ── Prometheus ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: hcx-ai
  labels:
    app.kubernetes.io/name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
    spec:
      securityContext:
        fsGroup: 65534
      initContainers:
        - name: fix-perms
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /prometheus/data && chown -R 65534:65534 /prometheus"]
          volumeMounts:
            - name: data
              mountPath: /prometheus
          securityContext:
            runAsUser: 0
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          ports:
            - containerPort: 9090
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time=30d
            # Fix #3: sub-path routing behind monitoring ingress
            - --web.external-url=https://monitoring.claim.healthflow.tech/prometheus
            - --web.route-prefix=/prometheus
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: hcx-ai
spec:
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: hcx-ai
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: do-block-storage
  resources:
    requests:
      storage: 20Gi

---
# ── Grafana ──────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: hcx-ai
  labels:
    app.kubernetes.io/name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
    spec:
      securityContext:
        fsGroup: 472
      initContainers:
        - name: fix-perms
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 472:472 /var/lib/grafana"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
          securityContext:
            runAsUser: 0
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          ports:
            - containerPort: 3000
          env:
            # Fix #4: dedicated Grafana admin password (not SECRET_KEY)
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hfcx-ai-secrets
                  key: GRAFANA_ADMIN_PASSWORD
            # Fix #3: sub-path routing behind monitoring ingress
            - name: GF_SERVER_ROOT_URL
              value: "https://monitoring.claim.healthflow.tech/grafana"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: hcx-ai
spec:
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: hcx-ai
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: do-block-storage
  resources:
    requests:
      storage: 5Gi

---
# ── Jaeger (Tracing) ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: hcx-ai
  labels:
    app.kubernetes.io/name: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jaeger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.58
          ports:
            - containerPort: 16686
              name: ui
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
          args:
            # Fix #3: sub-path routing behind monitoring ingress
            - --query.base-path=/jaeger
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: hcx-ai
spec:
  selector:
    app.kubernetes.io/name: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318

---
# ── Redis Stack (with RediSearch for LangGraph checkpointer) ────────────────
# Fix #5: added PVC + AOF persistence so LangGraph checkpoint state survives
# pod restarts. Also persists agent_memory L1 cache, eligibility cache,
# duplicate-claim bloom, and fraud provider scores.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-stack
  namespace: hcx-ai
  labels:
    app.kubernetes.io/name: redis-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-stack
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-stack
    spec:
      initContainers:
        - name: fix-perms
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1000:1000 /data"]
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            runAsUser: 0
      containers:
        - name: redis-stack
          image: redis/redis-stack-server:7.2.0-v6
          ports:
            - containerPort: 6379
              name: redis
          env:
            - name: REDIS_ARGS
              value: "--appendonly yes"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redis-stack-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis-stack
  namespace: hcx-ai
spec:
  selector:
    app.kubernetes.io/name: redis-stack
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-stack-pvc
  namespace: hcx-ai
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: do-block-storage
  resources:
    requests:
      storage: 10Gi
