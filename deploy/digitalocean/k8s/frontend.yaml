# ─────────────────────────────────────────────────────────────────────────────
# HFCX AI Claims — Frontend Deployment (DigitalOcean DOKS)
#
# Image tags substituted by envsubst:
#   ${FRONTEND_IMG}  — registry.digitalocean.com/hfcx-registry/hfcx-ai-claims-frontend:sha-xxxxx
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hfcx-frontend
  namespace: hcx-ai
  labels:
    app.kubernetes.io/name: hfcx-ai-claims
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: hfcx-ai-claims
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hfcx-ai-claims
        app.kubernetes.io/component: frontend
    spec:
      serviceAccountName: hfcx-ai-sa
      terminationGracePeriodSeconds: 15
      containers:
        - name: frontend
          image: ${FRONTEND_IMG}
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          # NOTE: NEXT_PUBLIC_API_BASE_URL is baked into the JS bundle at
          # build time (Next.js inlines NEXT_PUBLIC_* during `next build`).
          # Setting it here as a runtime env var has no effect. The actual
          # value is set via the build-arg in deploy-digitalocean.yml.
          env:
            - name: NODE_ENV
              value: "production"
            - name: KEYCLOAK_URL
              value: "https://auth.claim.healthflow.tech"
            - name: KEYCLOAK_REALM
              value: "hcx"
            - name: KEYCLOAK_CLIENT_ID
              value: "hfcx-portal"
            - name: PORTAL_BASE_URL
              value: "https://portal.claim.healthflow.tech"
            - name: KEYCLOAK_INTERNAL_URL
              value: "http://keycloak.hcx-ai.svc.cluster.local:8080"
            - name: API_INTERNAL_URL
              value: "http://hfcx-ai-api.hcx-ai.svc.cluster.local:8090"
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
      nodeSelector:
        workload: general

---
# ── Frontend HPA ─────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hfcx-frontend-hpa
  namespace: hcx-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hfcx-frontend
  minReplicas: 1
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
