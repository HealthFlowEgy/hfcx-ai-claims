---
# ─────────────────────────────────────────────────────────────────────────────
# Kubernetes manifests for HFCX AI Claims Layer (SRS Section 10)
# Deploys in hcx-ai namespace alongside existing hcx namespace
#
# Apply: kubectl apply -f k8s/
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Namespace
metadata:
  name: hcx-ai
  labels:
    app.kubernetes.io/part-of: hfcx-platform
    app.kubernetes.io/managed-by: argocd

---
# ── ConfigMap — non-secret configuration ─────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: hfcx-ai-config
  namespace: hcx-ai
data:
  APP_ENV: "production"
  APP_NAME: "hfcx-ai-claims"
  LOG_LEVEL: "INFO"
  HOST: "0.0.0.0"
  PORT: "8090"
  WORKERS: "4"
  KAFKA_TOPIC_CLAIMS_VALIDATED: "hcx.claims.validated"
  KAFKA_TOPIC_CLAIMS_ENRICHED: "hcx.claims.enriched"
  KAFKA_TOPIC_DLQ: "hcx.claims.ai.dlq"
  KAFKA_CONSUMER_GROUP: "hfcx-ai-claims-group"
  # FR-EV-001: 24 hour eligibility cache
  REDIS_ELIGIBILITY_TTL_SECONDS: "86400"
  REDIS_AGENT_STATE_TTL_SECONDS: "86400"
  CHROMA_PORT: "8000"
  LITELLM_TIMEOUT_SECONDS: "30"
  LITELLM_MAX_RETRIES: "3"
  ENABLE_FRAUD_AGENT: "true"
  ENABLE_CODING_AGENT: "true"
  ENABLE_ELIGIBILITY_AGENT: "true"
  ENABLE_NECESSITY_AGENT: "true"
  ENABLE_ARABIC_NLP: "true"
  AI_BYPASS_ON_FAILURE: "true"
  OTEL_SERVICE_NAME: "hfcx-ai-claims"
  CORS_ALLOW_ORIGINS: "https://portal.healthflow.io,https://payer.healthflow.io"
  CIRCUIT_BREAKER_FAIL_MAX: "5"
  CIRCUIT_BREAKER_RESET_TIMEOUT_SECONDS: "30"

---
# ── Secret — MUST be provisioned out-of-band (sealed-secrets / vault) ────────
# This is a placeholder template. Operators should replace values with
# sealed-secrets or ESO-sourced entries. The pods will CrashLoopBackOff until
# a real Secret with the same name exists.
apiVersion: v1
kind: Secret
metadata:
  name: hfcx-ai-secrets
  namespace: hcx-ai
type: Opaque
stringData:
  SECRET_KEY: "REPLACE-WITH-SEALED-SECRET-32+CHARS"
  DATABASE_URL: "postgresql+asyncpg://hfcx_ai:REPLACE@postgres.hcx.svc:5432/hfcx_ai"
  REDIS_URL: "redis://redis.hcx.svc:6379/0"
  KAFKA_BOOTSTRAP_SERVERS: "redpanda.hcx.svc:9092"
  LITELLM_BASE_URL: "http://litellm.hcx-ai.svc:4000"
  LITELLM_API_KEY: "REPLACE"
  CHROMA_HOST: "chromadb.hcx-ai.svc"
  KEYCLOAK_URL: "https://auth.healthflow.io"
  KEYCLOAK_CLIENT_SECRET: "REPLACE"
  NDP_API_URL: "http://ndp.hcx.svc/ndp/v1"
  NDP_API_KEY: "REPLACE"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.monitoring.svc:4317"

---
# ── AI Claims API Deployment ──────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hfcx-ai-claims-api
  namespace: hcx-ai
  labels:
    app: hfcx-ai-claims-api
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hfcx-ai-claims-api
  template:
    metadata:
      labels:
        app: hfcx-ai-claims-api
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8090"
        prometheus.io/path: "/internal/ai/metrics"
    spec:
      serviceAccountName: hfcx-ai-sa
      containers:
        - name: api
          image: healthflow/hfcx-ai-claims:1.0.0
          ports:
            - containerPort: 8090
          command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8090", "--workers", "4"]
          envFrom:
            - configMapRef:
                name: hfcx-ai-config
            - secretRef:
                name: hfcx-ai-secrets
          livenessProbe:
            httpGet:
              path: /internal/ai/health
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /internal/ai/health
              port: 8090
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"

---
# ── Kafka Consumer Deployment (min=3, max=6 — bounded by partition count) ────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hfcx-ai-consumer
  namespace: hcx-ai
  labels:
    app: hfcx-ai-consumer
    component: consumer
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hfcx-ai-consumer
  template:
    metadata:
      labels:
        app: hfcx-ai-consumer
        component: consumer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8091"
    spec:
      serviceAccountName: hfcx-ai-sa
      containers:
        - name: consumer
          image: healthflow/hfcx-ai-claims:1.0.0
          command: ["python", "-m", "src.kafka.consumer"]
          envFrom:
            - configMapRef:
                name: hfcx-ai-config
            - secretRef:
                name: hfcx-ai-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"

---
# ── GPU LLM Inference pool (Ollama/vLLM) ─────────────────────────────────────
# Separate deployment pinned to GPU nodes via nodeSelector + toleration.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hfcx-ai-llm-gpu
  namespace: hcx-ai
  labels:
    app: hfcx-ai-llm-gpu
    component: llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hfcx-ai-llm-gpu
  template:
    metadata:
      labels:
        app: hfcx-ai-llm-gpu
    spec:
      nodeSelector:
        accelerator: nvidia-a100
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: "2000m"
              memory: "16Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "8000m"
              memory: "32Gi"
              nvidia.com/gpu: "1"
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: hfcx-ai-llm-models

---
# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: hfcx-ai-claims-api
  namespace: hcx-ai
  labels:
    app: hfcx-ai-claims-api
spec:
  selector:
    app: hfcx-ai-claims-api
  ports:
    - name: http
      port: 8090
      targetPort: 8090
  type: ClusterIP               # Internal only — not exposed via Ingress (SEC-001)

---
# ── HPA — Coordinator / API (SRS NFR-002: 3-10 pods at 70% CPU) ──────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hfcx-ai-claims-api-hpa
  namespace: hcx-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hfcx-ai-claims-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# ── HPA — Kafka Consumer ──────────────────────────────────────────────────────
# SRS NFR-002 says Fraud Agent 3-15, but the consumer cannot exceed the Kafka
# partition count (6). Cap at 6 so we never have idle consumers; the Fraud
# agent is exercised inside each consumer, so the 3-15 intent is met by the
# combined API HPA (3-10) plus the consumer HPA (3-6).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hfcx-ai-consumer-hpa
  namespace: hcx-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hfcx-ai-consumer
  minReplicas: 3
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
# ── PVC for LLM model weights (MinIO-backed or local SSD) ────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hfcx-ai-llm-models
  namespace: hcx-ai
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 200Gi

---
# ── ServiceAccount ────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hfcx-ai-sa
  namespace: hcx-ai

---
# ── NetworkPolicy — restrict ingress to hcx namespace only (SEC-001) ─────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hfcx-ai-network-policy
  namespace: hcx-ai
spec:
  podSelector:
    matchLabels:
      app: hfcx-ai-claims-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: hcx
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8090
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - port: 5432   # PostgreSQL
        - port: 6379   # Redis
        - port: 9092   # Kafka
        - port: 8000   # ChromaDB
        - port: 4000   # LiteLLM
        - port: 8080   # Keycloak
        - port: 4317   # OTEL
        - port: 11434  # Ollama
