              protocol: TCP
          env:
            - name: OLLAMA_MODELS
              value: /root/.ollama/models
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_NUM_PARALLEL
              value: "1"
            - name: OLLAMA_MAX_LOADED_MODELS
              value: "2"
            - name: OLLAMA_KEEP_ALIVE
              value: "30m"
          volumeMounts:
            - name: models
              mountPath: /root/.ollama/models
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "3500m"
              memory: "6400Mi"
          readinessProbe:
            httpGet:
              path: /api/tags
