---
# ─────────────────────────────────────────────────────────────────────────────
# Frontend Portals — Next.js (SRS §11)
# Deploys to the same hcx-ai namespace as the AI layer.
# Apply:  kubectl apply -f k8s/frontend.yaml
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: ConfigMap
metadata:
  name: hfcx-frontend-config
  namespace: hcx-ai
data:
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"
  NEXT_PUBLIC_API_BASE_URL: "https://api.healthflow.eg"
  KEYCLOAK_URL: "https://auth.healthflow.eg"
  KEYCLOAK_REALM: "hcx"
  KEYCLOAK_CLIENT_ID: "hfcx-frontend"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hfcx-frontend
  namespace: hcx-ai
  labels:
    app: hfcx-frontend
    component: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hfcx-frontend
  template:
    metadata:
      labels:
        app: hfcx-frontend
        component: frontend
    spec:
      containers:
        - name: web
          image: healthflow/hfcx-frontend:1.0.0
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: hfcx-frontend-config
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

---
apiVersion: v1
kind: Service
metadata:
  name: hfcx-frontend
  namespace: hcx-ai
spec:
  selector:
    app: hfcx-frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hfcx-frontend-hpa
  namespace: hcx-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hfcx-frontend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hfcx-frontend
  namespace: hcx-ai
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # CSP tailored to the Next.js + recharts + reactflow bundle.
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["portal.healthflow.eg"]
      secretName: hfcx-frontend-tls
  rules:
    - host: portal.healthflow.eg
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hfcx-frontend
                port:
                  number: 3000
